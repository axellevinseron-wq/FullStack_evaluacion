# Configuracion base (perfil por defecto / desarrollo local)
spring:
  application:
    name: ms-clientes

  datasource:
    url: jdbc:mysql://localhost:3306/ms_clientes?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        enable_lazy_load_no_trans: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false

server:
  port: 8008

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
# Perfil "docker": activado por SPRING_PROFILES_ACTIVE=docker en docker-compose.yml
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://ecomarket_mysql_db:3306/ms_clientes?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8080

---
# Perfil "prod": pensado para despliegue remoto (Railway/Render), variables via entorno
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: ${PORT:8080}
