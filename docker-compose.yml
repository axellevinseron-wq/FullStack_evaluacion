services:
  mysql:
    image: mysql:8.0
    container_name: ecomarket_mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init/create-databases.sql:/docker-entrypoint-initdb.d/create-databases.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - ecomarket-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ecomarket_phpmyadmin
    environment:
      PMA_HOST: ecomarket_mysql_db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - ecomarket-network

  ms-catalogo:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: ms-catalogo
        JAR_NAME: ms-catalogo-1.0.0
    container_name: ecomarket_ms_catalogo
    ports:
      - "8081:8080"
    environment:
      SPRING_APPLICATION_NAME: ms-catalogo
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://ecomarket_mysql_db:3306/ms_catalogo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecomarket-network

