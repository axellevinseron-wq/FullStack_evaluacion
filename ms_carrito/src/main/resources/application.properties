spring.application.name=ms_carrito

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ms_carrito?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=false

# Server Configuration
server.port=8080
spring.jpa.open-in-view=false

# Feign Configuration (Timeout 5s para evitar fallback inmediato)
feign.client.config.ms-catalogo.connectTimeout=5000
feign.client.config.ms-catalogo.readTimeout=5000
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
resilience4j.circuitbreaker.instances.ms-catalogo.slidingWindowSize=10
resilience4j.circuitbreaker.instances.ms-catalogo.failureRateThreshold=50
