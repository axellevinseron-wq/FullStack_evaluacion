  ms-usuarios:
    image: openjdk:17-jdk-slim
    container_name: ecomarket_ms_usuarios
    working_dir: /app
    volumes:
      - ./ms-usuarios/target/ms-usuarios-1.0.0.jar:/app/app.jar
    ports:
      - "8001:8080"
    environment:
      SPRING_APPLICATION_NAME: ms-usuarios
      SPRING_DATASOURCE_URL: jdbc:mysql://ecomarket_mysql_db:3306/ms_usuarios?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
    command: java -jar app.jar
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecomarket-network

